version: 2

sources:

  - name: manual
    description: "Commandes hors-Shopify saisies manuellement (drops physiques, ventes directes, événements). Import depuis CSV V1 Supabase legacy."
    database: lh_bronze
    schema: dbo
    
    tables:
      - name: raw_manual_orders
        description: "Commandes manuelles brutes — format tabulaire déjà structuré (pas de JSON)."
        columns:
          - name: manual_order_id
            description: "UUID généré côté V1 Supabase, fait office de clé primaire."
            tests:
              - not_null
              - unique
          - name: ordered_at
            description: "Date à laquelle la commande a été passée (saisie a posteriori)."
            tests:
              - not_null
          - name: drop_id
            description: "UUID du drop V1 associé. Sera mappé vers les drop_id V2 en Silver."
            tests:
              - not_null
          - name: financial_status
            description: "Statut de paiement (toujours 'PAID' pour cette source — uppercase, à normaliser en Silver)."
          - name: total_gross
            description: "Montant total TTC en EUR."
            tests:
              - not_null
          - name: currency
            description: "Devise (toujours EUR)."
          - name: notes
            description: "Champ libre — détail des articles vendus (ex: 'veste gris M / pantalon gris M')."
          - name: ingested_at
            description: "Timestamp d'ingestion dans le Lakehouse."
            tests:
              - not_null
          - name: source
            description: "Identifiant source, toujours 'manual_csv_v1_legacy'."
          - name: source_file
            description: "Chemin du CSV source dans le Lakehouse (lineage)."